server {
    listen 8080 default_server;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Serve Frontend SPA
    root /app/frontend_dist;
    index index.html;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Proxy to FastAPI — match all backend routes
    location ~ ^/(auth|profile|plans|aromi|progress|gamification|grocery|challenges|reports|health|docs|redoc|openapi.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: LLM calls can take 30-60 seconds
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Default SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
